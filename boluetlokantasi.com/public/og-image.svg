<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#1c1917"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <g opacity="0.05" fill="white">
    <circle cx="100" cy="100" r="60"/>
    <circle cx="300" cy="500" r="80"/>
    <circle cx="900" cy="150" r="70"/>
    <circle cx="1100" cy="450" r="50"/>
  </g>
  <!-- Amber accent strip -->
  <rect x="0" y="0" width="8" height="630" fill="#f59e0b"/>
  <!-- Brand text -->
  <text x="620" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white">Bolu Et Lokantası</text>
  <!-- Tagline -->
  <text x="620" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#fde68a">Bolu Yemekleri, Et Kültürü ve Lokanta Rehberi</text>
  <!-- Divider -->
  <rect x="510" y="350" width="220" height="3" rx="2" fill="#f59e0b"/>
  <!-- URL -->
  <text x="620" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#fcd34d">boluetlokantasi.com</text>
</svg>
