<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#450a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <g opacity="0.05" fill="white">
    <circle cx="100" cy="100" r="60"/>
    <circle cx="300" cy="500" r="80"/>
    <circle cx="900" cy="150" r="70"/>
    <circle cx="1100" cy="450" r="50"/>
  </g>
  <!-- Brand text -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Et &amp; Mangal</text>
  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#fecaca">Et Tarifleri, Mangal Kültürü ve Izgara Rehberi</text>
  <!-- Divider -->
  <rect x="500" y="360" width="200" height="3" rx="2" fill="#f59e0b"/>
  <!-- URL -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#fca5a5">et-mangal.com</text>
</svg>
